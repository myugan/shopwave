# Service account for Argo Workflow *pods* (not order-service).
# The send-invoice step mounts sendgrid-api-key — this Role grants secrets:get
# on that Secret. Broader than least-privilege on purpose for the security workshop.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-sa
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
    app.kubernetes.io/component: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-secrets-reader
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sendgrid-api-key"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-sa-secrets
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-secrets-reader
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: production
