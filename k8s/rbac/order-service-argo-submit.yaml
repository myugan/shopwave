# Lets order-service submit Workflows to Argo in the production namespace (client auth mode).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service-argo
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: order-service-argo-submit
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: order-service-argo-submit
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: order-service-argo-submit
subjects:
  - kind: ServiceAccount
    name: order-service-argo
    namespace: production
