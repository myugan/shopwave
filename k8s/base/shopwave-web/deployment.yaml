apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopwave-web
  namespace: production
  labels:
    app.kubernetes.io/name: shopwave-web
    app.kubernetes.io/part-of: shopwave
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shopwave-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shopwave-web
        app.kubernetes.io/part-of: shopwave
    spec:
      containers:
        - name: shopwave-web
          image: ghcr.io/shopwave/shopwave-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            # Read at request time by /api/orders/* route handlers (not at image build).
            - name: ORDER_API_URL
              value: "http://order-service:8080"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
