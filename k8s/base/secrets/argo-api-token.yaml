# Token used by order-service to call the Argo Server API (create workflows).
# Do not paste a real token in git. After kubectl apply -k k8s/, run:
#   TOKEN=$(kubectl -n production create token order-service-argo --duration=8760h)
#   kubectl -n production patch secret argo-api-token \
#     -p "{\"stringData\":{\"token\":\"Bearer ${TOKEN}\"}}"
# See k8s/README.md (Create ARGO_TOKEN) or k8s/MINIKUBE.md §5.
apiVersion: v1
kind: Secret
metadata:
  name: argo-api-token
  namespace: production
  labels:
    app.kubernetes.io/part-of: shopwave
type: Opaque
stringData:
  # Value must include the "Bearer " prefix — workflow.py sends it as Authorization header.
  token: "Bearer REPLACE_WITH_ARGO_API_TOKEN"
