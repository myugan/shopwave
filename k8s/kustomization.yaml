apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base

# Replace newName with your GitHub username or org (lowercase), matching GHCR packages from
# .github/workflows/publish-ghcr.yml — e.g. ghcr.io/myuser/shopwave-order-service
images:
  - name: ghcr.io/shopwave/shopwave-order-service
    newName: ghcr.io/shopwave/shopwave-order-service
    newTag: latest
  - name: ghcr.io/shopwave/shopwave-web
    newName: ghcr.io/shopwave/shopwave-web
    newTag: latest
  - name: ghcr.io/shopwave/shopwave-notification-service
    newName: ghcr.io/shopwave/shopwave-notification-service
    newTag: latest
