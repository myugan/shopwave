# Build and push ShopWave images to GHCR.
#
# - Workflow does not run on pushes that only touch other paths (e.g. k8s/, README).
# - When it runs, only services with changed files are built (unless tag / manual / workflow edit).

name: Publish to GHCR

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/publish-ghcr.yml"
      - "order-service/**"
      - "shopwave-web/**"
      - "notification-service/**"
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        with:
          filters: |
            order-service:
              - 'order-service/**'
            shopwave-web:
              - 'shopwave-web/**'
            notification-service:
              - 'notification-service/**'
            workflow:
              - '.github/workflows/publish-ghcr.yml'

      - id: set-matrix
        run: |
          add() {
            ENTRY=$(jq -nc \
              --arg image "$1" \
              --arg context "$2" \
              --arg dockerfile "$3" \
              '{image: $image, context: $context, dockerfile: $dockerfile}')
            INCLUDE=$(echo "$INCLUDE" | jq -c --argjson e "$ENTRY" '. + [$e]')
          }

          INCLUDE='[]'
          BUILD_ALL=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_ALL=true
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            BUILD_ALL=true
          elif [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            BUILD_ALL=true
          fi

          if [ "$BUILD_ALL" = true ] || [ "${{ steps.filter.outputs.order-service }}" = "true" ]; then
            add shopwave-order-service ./order-service ./order-service/Dockerfile
          fi
          if [ "$BUILD_ALL" = true ] || [ "${{ steps.filter.outputs.shopwave-web }}" = "true" ]; then
            add shopwave-web ./shopwave-web ./shopwave-web/Dockerfile
          fi
          if [ "$BUILD_ALL" = true ] || [ "${{ steps.filter.outputs.notification-service }}" = "true" ]; then
            add shopwave-notification-service ./notification-service ./notification-service/Dockerfile
          fi

          echo "matrix={\"include\":${INCLUDE}}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: changes
    if: needs.changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
